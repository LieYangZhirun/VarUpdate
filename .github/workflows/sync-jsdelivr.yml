# 酒馆里用 @main 的 import 时：每次 push 到 main 后请求 jsDelivr 刷新该文件缓存，
# 减轻「分支引用被 CDN 拖很久不更新」的情况（浏览器若仍旧可试 Ctrl+F5）。
name: Purge jsDelivr (@main)

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge gh/@main/dist/bundle.js
        run: |
          REPO="${{ github.repository }}"
          echo "purge gh/${REPO}@main/dist/bundle.js"
          curl -fsS "https://purge.jsdelivr.net/gh/${REPO}@main/dist/bundle.js"
