# push 到 main 后 purge jsDelivr 上 @main 的 dist/bundle.js
name: Purge jsDelivr (@main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge gh/@main/dist/bundle.js
        run: |
          REPO="${{ github.repository }}"
          for path in \
            "gh/${REPO}@main/dist/bundle.js" \
            "gh/${REPO}@refs/heads/main/dist/bundle.js"
          do
            echo "purge https://purge.jsdelivr.net/${path}"
            curl -fsS "https://purge.jsdelivr.net/${path}" || echo "warn: ${path}"
          done
